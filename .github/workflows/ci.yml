name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python: "3.9"
          - os: ubuntu-latest
            python: "3.11"
          - os: macos-latest
            python: "3.11"
          - os: windows-latest
            python: "3.11"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,ml]"

      - name: Verify CLI
        run: python -m ag_foundation --help --no-log

      - name: Lint
        run: python -m ruff check src tests

      - name: Run tests
        run: python -m pytest -q
