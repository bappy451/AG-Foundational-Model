data:
  data_root: ../../Pretraining/ssharma2020:Plant-Seedlings-Dataset.zip
  catalog_path: ../catalogs/pretraining_seedlings_subset.csv
  crop_size: 32
  channels: 3
  batch_size: 4
  num_workers: 0
  prefetch_factor: 2
  val_fraction: 0.25

runtime:
  output_dir: ../runs/pretraining_seedlings_smoke
  epochs: 1
  seed: 27
  precision: fp32
  device: auto
  warmup_epochs: 0
  resume: false
  resume_from: null
  log_every: 10
  save_visualizations: true
  visualization_every: 1
  visualization_samples: 4

model:
  model_name: B
  pretrained_backbone: false
  pretrained_source: imagenet
  pretrained_cfg: null
  mask_ratio: 0.75
  gradient_checkpointing: false
  drop_rate: 0.0
  attn_drop_rate: 0.0
  drop_path_rate: 0.0

optimizer:
  learning_rate: 0.0001
  weight_decay: 0.0001
