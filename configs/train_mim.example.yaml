data:
  data_root: ../Pretraining
  catalog_path: ../Pretraining/catalog.csv
  crop_size: 224
  channels: 3
  batch_size: 8
  num_workers: 8
  prefetch_factor: 2
  val_fraction: 0.05

runtime:
  output_dir: ../runs/train_mim_example
  epochs: 10
  seed: 27
  precision: bf16
  device: auto
  warmup_epochs: 1
  gradient_accumulation_steps: 2
  resume: true
  resume_from: null
  initialize_from: null
  log_every: 10
  save_visualizations: true
  visualization_every: 1
  visualization_samples: 4

model:
  model_name: B
  pretrained_backbone: true
  pretrained_source: mae
  pretrained_cfg: null
  mask_ratio: 0.75
  gradient_checkpointing: false
  drop_rate: 0.0
  attn_drop_rate: 0.0
  drop_path_rate: 0.0

optimizer:
  learning_rate: 0.0001
  weight_decay: 0.0001
