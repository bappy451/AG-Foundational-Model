# High-Performance MIM Pretraining Configuration (WebDataset)
# Uses the massive 650GB dataset sharded into 1GB tarballs.
#
# Usage (Google Colab / Linux):
#   python -m ag_foundation train-mim --config configs/wds_mim_pretrain.yaml --use-dali
#
# Usage (Windows Local CPU-based WDS):
#   python -m ag_foundation train-mim --config configs/wds_mim_pretrain.yaml

data:
  data_root: 'E:\AG_Dataset\shards\dataset-*.tar'
  catalog_path: null
  crop_size: 224
  channels: 3
  batch_size: 96
  num_workers: 12
  prefetch_factor: 2
  val_fraction: 0.05

runtime:
  output_dir: ../runs/wds_mim_pretraining
  epochs: 2
  seed: 27
  precision: bf16
  device: auto
  warmup_epochs: 1
  gradient_accumulation_steps: 2
  resume: true
  resume_from: null
  initialize_from: null
  log_every: 50
  save_visualizations: true
  visualization_every: 1
  visualization_samples: 8

model:
  model_name: S
  pretrained_backbone: true
  pretrained_source: dinov3
  pretrained_cfg: null
  mask_ratio: 0.75
  gradient_checkpointing: false
  drop_rate: 0.0
  attn_drop_rate: 0.0
  drop_path_rate: 0.1

optimizer:
  learning_rate: 0.0005
  weight_decay: 0.04
